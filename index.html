<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acheeii!!! - Ativar Proteção</title>
    <style>
        body { font-family: sans-serif; background-color: #003366; color: white; text-align: center; padding: 20px; }
        .card { background: white; color: #333; padding: 25px; border-radius: 15px; max-width: 450px; margin: 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h1 { color: #003366; font-size: 1.4rem; margin-bottom: 5px; }
        p { font-size: 0.9rem; color: #666; }
        label { display: block; text-align: left; font-size: 0.85rem; font-weight: bold; margin: 10px 0 5px 5px; color: #003366; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 15px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        button:disabled { background-color: #ccc; }
        .termos { display: flex; align-items: flex-start; gap: 8px; text-align: left; margin: 15px 0; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="card">
    <div id="app-container">
        <h1>Ativar Etiqueta Mestre</h1>
        <p>Cadastre-se uma única vez para gerenciar seus adesivos.</p>
        
        <form id="formCadastro">
            <label>Seu Nome Completo</label>
            <input type="text" id="nome" oninput="validar()">

            <label>Seu WhatsApp</label>
            <input type="tel" id="tel" placeholder="(00) 00000-0000" oninput="validar()">

            <div class="termos">
                <input type="checkbox" id="checkTermos" onchange="validar()">
                <span>Li e aceito os <a href="#" onclick="alert('Termos: Seus dados serão usados apenas para facilitar a devolução de seus objetos.')">Termos de Responsabilidade</a>.</span>
            </div>

            <button type="button" id="btnAtivar" disabled onclick="ativar()">Ativar Minha Cartela</button>
        </form>
    </div>
</div>

<script>
    const API_URL = 'https://beoq915off.execute-api.us-east-2.amazonaws.com/v1/notificar'; 
    const urlParams = new URLSearchParams(window.location.search);
    const tagId = urlParams.get('id');

    window.onload = async () => {
        if (!tagId) return alert("QR Code Inválido ou ID ausente.");
        
        try {
            const res = await fetch(`${API_URL}?id=${tagId}`);
            const data = await res.json();
            
            // Bloqueio se já estiver ativada
            if (res.status === 403 || (data.tipo === 'mae' && data.ativada)) {
                document.getElementById('app-container').innerHTML = "<h1>Aviso</h1><p>Esta etiqueta mestre já foi ativada. Use agora os adesivos menores nos seus objetos.</p>";
            }
        } catch (e) { console.log("Pronto para ativar."); }
    };

    function validar() {
        const nome = document.getElementById('nome').value;
        const tel = document.getElementById('tel').value;
        const aceito = document.getElementById('checkTermos').checked;
        document.getElementById('btnAtivar').disabled = !(nome && tel && aceito);
    }

    async function ativar() {
        const payload = {
            tag_id: tagId,
            ativada: true,
            tipo: 'mae',
            owner_name: document.getElementById('nome').value,
            owner_phone: document.getElementById('tel').value
        };

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                // SALVA O ID MÃE NO NAVEGADOR PARA OS PRÓXIMOS SCANS
                localStorage.setItem('id_mae_acheeii', tagId);
                
                alert("Cartela ativada! Agora você pode colar e cadastrar seus 6 adesivos de objetos.");
                location.reload(); 
            } else {
                alert("Erro ao ativar. Tente novamente.");
            }
        } catch (e) {
            alert("Erro de conexão com o servidor.");
        }
    }
</script>
</body>
</html>
